<title>Verificar Certificado - GlobalVet México</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Plus Jakarta Sans",system-ui,sans-serif;}
body{background:linear-gradient(135deg,#2d1148 0%,#4b1c71 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:#1a1a1a;}
.card{background:#fdfcf7;border-radius:20px;max-width:520px;width:100%;padding:40px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.35);position:relative;overflow:hidden;}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#c9a04a,#e8c97d,#c9a04a);}
.brand{display:flex;justify-content:center;margin-bottom:24px;}
.brand img{height:54px;width:auto;}
.title{font-family:"Sora",sans-serif;font-size:22px;font-weight:800;text-align:center;color:#2d1148;letter-spacing:-0.3px;margin-bottom:6px;}
.subtitle{font-size:13px;color:#5a5a5a;text-align:center;margin-bottom:28px;}
.loader{display:flex;justify-content:center;padding:32px 0;}
.spinner{width:42px;height:42px;border:3px solid #ebe0f7;border-top-color:#4b1c71;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.result{display:none;}.result.show{display:block;animation:slideUp 0.4s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.toast{padding:18px 20px;border-radius:14px;display:flex;align-items:flex-start;gap:14px;margin-bottom:24px;font-weight:600;}
.toast.success{background:#e8f7ee;border:1.5px solid #2da55a;color:#1a5e30;}
.toast.error{background:#fdecec;border:1.5px solid #d63838;color:#7a1f1f;}
.toast-icon{flex-shrink:0;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:16px;}
.toast.success .toast-icon{background:#2da55a;}.toast.error .toast-icon{background:#d63838;}
.toast-text{flex:1;font-size:14px;line-height:1.45;}
.toast-text strong{display:block;font-size:15px;margin-bottom:3px;}
.details{background:#faf6ed;border-radius:12px;padding:18px 20px;border:1px solid #ebe0d0;}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #ebe0d0;font-size:13px;gap:12px;}
.row:last-child{border-bottom:none;}
.row .lbl{color:#7a7a7a;font-weight:500;}
.row .val{color:#1a1a1a;font-weight:700;text-align:right;}
.row .val.folio{font-family:"SF Mono","Courier New",monospace;font-size:11.5px;letter-spacing:0.5px;color:#4b1c71;}
.footer{margin-top:28px;text-align:center;font-size:11px;color:#9c8a78;letter-spacing:0.4px;}
.footer a{color:#4b1c71;text-decoration:none;font-weight:600;}
.badge{display:inline-block;background:#2da55a;color:white;padding:5px 12px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:1.2px;}
</style>
</head>

<script>

var db=firebase.firestore();
function getParam(name){var url=new URL(window.location.href);return url.searchParams.get(name);}
function showError(titulo,desc){
  document.getElementById("loader").style.display="none";
  var r=document.getElementById("result");
  r.innerHTML='<div class="toast error"><div class="toast-icon">!</div><div class="toast-text"><strong>'+titulo+'</strong>'+desc+'</div></div>';
  r.classList.add("show");
}
function escapeHtml(s){if(typeof s!=="string")return s;return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function showSuccess(data){
  document.getElementById("loader").style.display="none";
  var r=document.getElementById("result");
  var html='<div class="toast success"><div class="toast-icon">\u2713</div><div class="toast-text"><strong>Certificado válido emitido por IPCI Latinoamericano</strong>Este certificado ha sido emitido oficialmente y se encuentra registrado en nuestro sistema.</div></div>';
  html+='<div class="details">';
  html+='<div class="row"><span class="lbl">Otorgado a</span><span class="val">'+escapeHtml(data.nombre||"-")+'</span></div>';
  html+='<div class="row"><span class="lbl">Curso</span><span class="val">'+escapeHtml(data.curso||"-")+'</span></div>';
  html+='<div class="row"><span class="lbl">Fecha de emisión</span><span class="val">'+escapeHtml(data.fechaTxt||"-")+'</span></div>';
  html+='<div class="row"><span class="lbl">Folio</span><span class="val folio">'+escapeHtml(data.folio||"-")+'</span></div>';
  html+='<div class="row"><span class="lbl">Estado</span><span class="val">'+(data.vigente!==false?'<span class="badge">VIGENTE</span>':"REVOCADO")+'</span></div>';
  html+='<div class="row"><span class="lbl">Emitido por</span><span class="val">'+escapeHtml(data.emisor||"IPCI Latinoamericano")+'</span></div>';
  html+='</div>';
  r.innerHTML=html;
  r.classList.add("show");
}
var folio=getParam("folio");
if(!folio){
  showError("Folio no proporcionado","La URL no contiene un folio válido. Verifica que el QR escaneado sea correcto.");
}else{
  db.collection("certificados").doc(folio).get().then(function(doc){
    if(!doc.exists){
      showError("Certificado no encontrado","El folio \""+escapeHtml(folio)+"\" no existe en nuestros registros. Es posible que el certificado no sea auténtico o haya sido emitido por otra entidad.");
      return;
    }
    showSuccess(doc.data());
  }).catch(function(err){
    showError("Error al verificar","No se pudo conectar con el servidor de verificación. Intenta de nuevo en unos momentos.");
    console.error(err);
  });
}
